transform: 
  name: Transform
  playbook: The Beast
  text: "You have a bestial form, which you can assume at will and must assume whenever your Feral hits 4. When you do, tell everyone what the beast in you looks like, increase your Feral to 4 if it’s not there already, and roll +Daring:
\n10+: Choose 2 
\n7–9: Choose 1
\n- You are in harmony with your beast and may clear a Condition
\n- You are magnificent and little escapes your notice; you gain leverage or an opportunity with a monster
\n- Pain is nothing to you; ignore the next time you would **Stagger** while transformed
\n- You can move in ways no ordinary person could
\nYou revert to your usual form when your Feral drops below 4. While transformed, you may mark a Condition to avoid reducing your Feral, as often as you like."
big dyke energy:
  name: Big Dyke Energy
  playbook: The Beast
  text: When you make it clear to your foes that you’re the biggest threat, then for the rest of the scene, whenever you roll a 10+, you may choose someone present to be impressed or intrigued with you. Once during the scene, when you gain a String on someone, gain an additional String on someone else who considers you an enemy.
ferocious:
  name: Ferocious
  playbook: The Beast
  text: When you **Fight**, you may mark a Condition to choose an additional option, even on a 6-.
shameless:
  name: Shameless
  playbook: The Beast
  text: When you say aloud what you want from an NPC, you may give them a String on you to ask a question about them from the **Figure Out a Person** move.
tenacious purpose:
  name: Tenacious Purpose
  playbook: The Beast
  text: When you commit yourself to a specific goal, you may ask the GM once per scene how you could advance that goal in a way that violates “civilized” norms. Take +1 forward to act on the answer. If you refrain, it counts as an uncomfortable situation that reduces your Feral by 1 and you must mark a Condition.
tracker:
  name: Tracker
  playbook: The Beast
  text: When you investigate a person’s living space, camp, or trail, or an object important to them, you can roll +Heart instead of +Wit to **Figure Them Out**, and may do so even when they’re not present. You can also ask the question, “Where did they go?” as if it were an option on the list for that move. On a 7–9, they take a String on you instead of asking a question back. Say why. Do they just smell that good or that fearsome?
the fated day approaches:
  name: The Fated Day Approaches
  playbook: The Chosen
  text: "Whenever you miss an opportunity to make progress towards your Destiny, choose 1:
        \na Someone with power over you makes an uncomfortable demand in furtherance
        \nof your Destiny, backed by a threat
        \naThe PC you care about the most receives bad news or has an accident serious
        \nenough to make them **Stagger**
        \nThe GM will tell you the details, inspired by your Destiny. They may wait until a lull
        \nin the action to drop the consequences on you."
dont you know who i am:
  name: Don't You Know Who I Am?
  playbook: The Chosen
  text: "When you meet someone who knows you by
        \nreputation (you decide), roll +Heart:
        \n10+: Say two things they’ve heard about you 
        \n7–9: You say one, the GM says one"
entourage:
  name: Entourage
  playbook: The Chosen
  text: "You have a group of loyal attendants. Name three of them who accompany you and choose a trait for them: Dangerous, Fanatical, Resourceful, Charming
        \nChoose a basic move. Your entourage grants you a +1 on rolls for this move when present. When you would **Stagger**, you may choose instead for one of your named Entourage to die. If you do, your Entourage gains a String on you."
gossip:
  name: Gossip
  playbook: The Chosen
  text: "When you seek insight about a person by spending some time gossiping with those who know them, roll +Wit:
        \n10+: You learn a dangerous secret and gain a String on the target. You may also ask a question from the **Figure Out a Person** move.
        \n7–9: You may ask a question from the **Figure Out a Person** move.
        \nSomeone you speak to who is dangerous to you may ask a question of you from the same list."
guidance from above:
  name: Guidance From Above
  playbook: The Chosen
  text: When you petition a superior for guidance, they give you instructions and useful information. Mark XP or clear a Condition if you do as commanded. They gain a String on you if you do otherwise.
help me:
  name: Help Me--!
  playbook: The Chosen
  text: You’re a magnet for trouble and hunted by those who would use you for their own purposes. Others mark XP when they Defy Disaster that would otherwise befall you. In addition, whenever you’re captured, your captor reveals something they hope to achieve; gain a String on them and mark XP.
know your place:
  name: Know Your Place!
  playbook: The Chosen
  text: "When someone dares insult you and you deliver a scathing retort, roll +Wit:
        \n10+: Word spreads of your sharp wit, take +1 forward, and they choose 1 7–9: They choose 1
        \nBack down
        \nMake a fool of themself 
        \nAttack you"
fanatical selfsacrifice:
  name: Fanatical Self-Sacrifice
  playbook: The Devoted
  text: You may mark a Condition to prevent a Condition being inflicted on another. When you do, mark XP, and you may only clear that Condition by taking the associated destructive action. Mark it with an asterisk to remind yourself. Also, your Conditions only cause a –1 penalty to the associated basic moves (instead of –2).
for the cause:
  name: For The Cause
  playbook: The Devoted
  text: When you **Fight** the enemy of your Devotion, you can suffer a Condition to choose an additional option from the **Fight** move, even if you roll a 6-. You can inflict a Condition a second time within a single **Fight** move this way.
gallant rescue:
  name: Gallant Rescue
  playbook: The Devoted
  text: "When you **Defy Disaster** that’s about to befall someone else, you can either gain a String on them or ask one of the following questions, even if you roll a 6-. You can only gain one String per scene in this way on any given person. 
        \nHow do you feel about my Devotion?
        \nWhat secret pain lies in your heart?"
power of conviction:
  name: Power Of Conviction
  playbook: The Devoted
  text: When you **Entice** someone while extolling the virtues of your Devotion or invoking its authority, you may roll +Spirit instead of +Heart. A superior in your Devotion gains a String on you, representing your dependence.
lay on hands:
  name: Lay on Hands
  playbook: The Devoted
  text: "When you touch someone as part of **Emotional Support**, you heal their physical ailments. Tell them how your Devotion sustains you; they mark an XP if they validate your Devotion, and you gain a String on them if they criticize it."
loyal steed:
  name: Loyal Steed
  playbook: The Devoted
  text: ame your steed and detail two strengths and two weaknesses from the following list. When riding your steed, you may roll +Spirit instead of +Daring to **Fight** and may take a person with you whenever you **Defy Disaster**.
toxic devotion:
  name: Toxic Devotion
  playbook: The Devoted
  text: "Once per scene, when you forgive your Devotion for abusing you or make excuses for obvious problems with your Devotion, take +1 forward or mark XP. Also, once per scene, when you learn that another PC thinks your Devotion is problematic and you don’t defend it, mark a Condition and give them a String on you."
wicked past:
  name: Wicked Past
  playbook: The Infamous
  text: "When you hear about a villain for the first time, you may decide that you know them from your past. If so, give them a String on you to ask a question from the **Figure Out a Person** list and take +1 forward against them."
make it right:
  name: Make It Right
  playbook: The Infamous
  text: "When you allow yourself to be vulnerable to someone you hurt during your villainous past, they choose 1
        \nDecline to engage; they gain a String on you
        \nLash out; you Stagger
        \nGuide you; they mark XP and give you a task to help make amends
        \nShow vulnerability; you take +1 forward to interact with them
        \nForgive you; you each clear a Condition and this move no longer triggers with this person"
always suspect:
  name: Always Suspect
  playbook: The Infamous
  text: "When you pretend to be a villain to win a villain’s trust, they trust you enough to offer you an opportunity and you gain a String on them. You must choose one of the following options:
        \nSomeone watching comes to the worst possible conclusion
        \nThe villain requires an act of villainy to prove your intentions first
        \nThe villain is only pretending to trust you and the opportunity is a trap"
talons of the past:
  name: Talons of the Past
  playbook: The Infamous
  text: When you gain a String on someone associated with your villainous past, or vice versa, mark XP. The first time this happens for a given person, you each can define a secret or vulnerability you know about the other.
they can change too:
  name: They Can Change, Too
  playbook: The Infamous
  text: When you give up an advantage on someone dangerous because you believe they can mend their wicked ways, you can ask a question as if you’d **Figured Them Out**.
used to disappointment:
  name: Used to Disappointment
  playbook: The Infamous
  text: "When you rely upon or trust someone else with something important, say how you expect them to let you down.
        \nIf they pleasantly surprise you, they gain a String on you
        \nIf they do as you expect, choose 1: they lose a String on you, or you gain a String on them
        \nIf they are somehow even worse than you expected, you have a choice: berate them and inflict a Condition, or swallow your loneliness and take a Condition yourself"
what makes a home:
  name: What Makes a Home
  playbook: The Infamous
  text: If every other PC in a scene has a String on you, your Conditions cause you only a –1 penalty instead of a –2 to the associated basic moves.
whos the monster:
  name: Who's the Monster?
  playbook: The Infamous
  text: "When you expose the hypocrisy of someone who is supposedly virtuous, roll +Daring:
        \n10+: Gain a String on them and choose 1 
        \n7–9: Choose 1
        \nThe wrongness of their act is exposed to all; they mark XP if they change their mind. If they don’t, they must attack you or take a Condition.
        \nYour words sting; they take a Condition.
        \nYou impress an onlooker; gain a String on them."
wild friends:
  name: Wild Friends
  playbook: The Nature Witch
  text: You can speak with animals and plants and may **Influence** them with Strings just like other NPCs. Near your home, or anywhere you have spent a long period of time, animal and plant friends are always nearby when you want them.
awaken the wild:
  name: Awaken the Wild
  playbook: The Nature Witch
  text: "When you are in a safe position and attempt to commune with a place or non-sentient creature, roll +Spirit:
        \n10+: Choose 1
        \n7–9: Choose 1, GM will offer you a hard choice or success at a cost
        \nYou cleanse it of hurt, corruption, or sickness
        \nYou alter its behavior, ecosystem, or atmosphere to one you choose
        \nYou make it dangerous to a certain person or creature, or a type of person or creature
        \nIf you attempt this move while rushed or while distressed to the point of having three or more Conditions, it works as above, briefly, but afterwards the place or creature will fall dead and barren."
familiar:
  name: Familiar
  playbook: The Nature Witch
  text: You have a cute animal as your loyal familiar. You can perceive the world through its senses whenever you choose and communicate with it at any distance. In addition, choose a basic move. When the familiar helps with that basic move or with **Emotional Support**, take +1 to your roll.
i ship it:
  name: I Ship It
  playbook: The Nature Witch
  text: "When you want to make a match between two other people and talk up one to the other, roll +Heart:
        \n10+: You may give the listener a String on the other person or give the other person a String on the listener
        \n7–9: As above, and the listener can either take a String on you or give the other person a String on you
        \nAnyone involved may mark XP if they become **Smitten** with anyone else involved, including the Witch (immediately or later this session, maximum of 1 XP per PC)."
the magic of love:
  name: The Magic of Love
  playbook: The Nature Witch
  text: When you’re **Smitten** with someone and proudly extol the power of love, either of you may spend a String on the other to gain the use of one of their playbook moves for one scene.
natures touch:
  name: Nature's Touch
  playbook: The Nature Witch
  text: "When you touch someone and let the power of the natural world flow into them, roll +Spirit: 
        \n10+: Choose 2
        \n7–9: Choose 1
        \nThey may give you a String on them to clear a Condition
        \nThey gain the ability to speak with plants and animals for the rest of the scene
        \nThey must answer one of the Figure Out a Person questions of your choice or else they take a Condition"
lust at first sight:
  name: Lust at First Sight
  playbook: The Scoundrel
  text: When you become **Smitten** with someone you barely know, declare your undying love and give them a String on you. Lose your **Smitten** status with anyone who has no Strings on you. Take +1 forward to any act you think might impress your new interest.
shiny and new:
  name: Shiny and New
  playbook: The Scoundrel
  text: When you give or receive **Emotional Support** in an intimate moment with someone new, you each mark XP or clear a Condition.
better to seek forgiveness:
  name: Better to Seek Forgiveness
  playbook: The Scoundrel
  text: "When you apologize to someone for your outrageous conduct and put yourself at their mercy, roll +Daring:
        \n10+: You find out what it will take for them to forgive you and you each gain a String on the other. If they forgive you, you each clear a Condition.
        \n7–9: You find out what it will take for them to forgive you. If you do it, you either take Strings on each other or they may clear a Condition, your choice."
fools rush in:
  name: Fools Rush In
  playbook: The Scoundrel
  text: When you vault into a situation without forethought and wind up way over your head, give someone dangerous to you a String, mark XP, and take +1 forward to **Defy Disaster**.
impressive swordplay:
  name: Impressive Swordplay
  playbook: The Scoundrel
  text: Whenever you roll a 7+ to **Fight**, you may gain a String on someone who is present and ask their player what it is about you that has impressed or intrigued them.
the main attraction:
  name: The Main Attraction
  playbook: The Scoundrel
  text: "When you make a dramatic entrance, roll +Grace:
        \n10+: Choose 2
        \n7-9: Choose 1
        \nAll attention is focused on you for a moment
        \nYou hold the attention of one person for as long as you deliver a dramatic speech
        \nTake a String on someone present aYou take +1 forward"
one in every port:
  name: One in Every Port
  playbook: The Scoundrel
  text: "When you return to any town you’ve been to before, name a person with whom you shared intimacy here and say how you left things. If you left on bad terms, mark XP and the GM will tell you something interesting that has changed since you were last here."
rrrip:
  name: Rrrip!
  playbook: The Scoundrel
  text: When you take or narrowly evade a physical blow from someone dangerous to you, you may declare that your clothes were damaged and are now practically indecent. For the remainder of the scene, when you roll a 10+ on any move against an NPC, you may declare that they have a crush on you (up to one NPC per roll and subject to GM discretion). Additionally, any PC who becomes **Smitten** with you during the remainder of the scene may mark XP.
people are people:
  name: People Are People
  playbook: The Seeker
  text: "When you talk about your home, roll +Heart: 10+: Choose 2
        \n7–9: Choose 1
        \nAdmit a flaw about your home; gain +1 forward
        \nShare something good about your home; clear a Condition aLie about your home to impress a listener; take a String on them"
hear me:
  name: Hear Me!
  playbook: The Seeker
  text: "When you shout one of your Convictions aloud in confrontation with those who hold a contrary belief, roll +Daring:
        \n10+: Ask 2 7–9: Ask 1
        \nWhy do you think you must follow that belief? 
        \nWhat does it cost you to follow that belief?
        \nWhat do you wish for that is contrary to that belief?"
it wasnt all bad:
  name: It Wasn't All Bad
  playbook: The Seeker
  text: "When you encounter someone whose perspective is different from that of your companions, share a relevant story from your home culture and roll +Spirit:
        \n10+: Gain a String on them and either take +1 forward to interact with them or grant that +1 forward to a companion
        \n7–9: Gain a String on them
        \nIn either case, they also tell you something interesting or useful about their upbringing."
listen and learn:
  name: Listen and Learn
  playbook: The Seeker
  text: "When you ask someone what you should do in an unfamiliar situation:
        \nIf you follow their advice, take +1 forward and clear a Condition
        \nIf you follow their advice and it goes poorly, mark XP"
proper courtship:
  name: Proper Courtship
  playbook: The Seeker
  text: "When you’re Smitten with someone and perform an elaborate and roundabout courtship ritual...
        \nIf the recipient responds properly, you each get +1 forward to protect each other until either of you breaks a Commandment, and they gain a point of Tradition that they can spend for the same effects you can
        \nIf they don’t understand that you’re **Smitten**, give a String to an onlooker who does understand"
silly tourist: 
  name: Silly Tourist
  playbook: The Seeker
  text: "When you **Figure Out a Person** or **Defy Disaster** by playing the fool, you may additionally ask a question from this list, even on a 6-: 
        \nWhat would make you laugh?
        \nWhat hidden threat or opportunity am I missing?
        \nHow are you vulnerable?"
stiff upper lip:
  name: Stiff Upper Lip
  playbook: The Seeker
  text: You can spend a point of Tradition to ignore the -2 penalty caused by Conditions. This effect ends if you violate a Commandment or at the end of the scene. When the effect ends, take a Condition.
i like snails:
  name: I Like Snails!
  playbook: The Spooky Witch
  text: "When you are **Smitten** with someone and **Figure Them Out**, blurt out something weird and let them ask you a question from the list. Then ask them another question from the list, even on a 6-."
astral dance:
  name: Astral Dance
  playbook: The Spooky Witch
  text: "When you dance across the boundary into the realm beyond, describe it and roll +Grace:
        \n10+: You and a small number of others who dance with you arrive at a distant destination of your choice.
        \n7–9: You don’t arrive where you intend, you arrive almost too late, or you lose something important in the process. The GM will tell you which."
divination:
  name: Divination
  playbook: The Spooky Witch
  text: "When you have time and safety to read the unseen truth of someone present, describe your divination process and what makes it conspicuous. The GM will tell you something interesting about the person or the obstacles they face that they don’t know. Then roll +Spirit:
        \n10+: If you tell the truth, they clear a Condition. If you lie, gain a String on them.
        \n7–9: They learn the truth and clear a Condition."
dreamwalk:
  name: Dreamwalk
  playbook: The Spooky Witch
  text: When you touch an unconscious, sleeping, or willing subject, you can see an impression of their thoughts and appear in their dreams. You may roll +Spirit to **Figure Out** or **Entice** them in this state.
eerie companion:
  name: Eerie Companion
  playbook: The Spooky Witch
  text: You have a little pet monster or spirit. Choose two basic moves. The companion grants you +1 to these moves when it assists you, but its assistance is always obvious and alarming to ordinary people. In addition, you can speak with monsters.
friends in weird places:
  name: Friends in Weird Places
  playbook: The Spooky Witch
  text: "You are friends with some odd people. Folx that others might not consider people at all...
        \nName three of them. For each one, write down one thing they’re good at, one reason why everyone else is afraid of them, and what you like to do together when you hang out.
        \nWhen you call on them for help, the GM tells you what they provide. Give them a String on you and mark the Favor next to their name. Whenever significant time passes, one of your friends with marked Favor will need help from you. Clear their Favor if you help, mark a Condition if you don’t."
talk nerdy to me:
  name: Talk Nerdy to Me
  playbook: The Spooky Witch
  text: You may roll +Wit instead of +Heart to **Entice** someone. In addition, choose an area of study that holds special interest for you. You have top-tier knowledge of this area and are always prepared with an interesting fact, and sometimes even a useful fact, when you come across something within your expertise. The GM will provide the information or invite you to make something up.
witchfire:
  name: Witchfire
  playbook: The Spooky Witch
  text: You may roll +Spirit instead of +Daring to **Fight**, but you’re very conspicuous when you do. The consequences of a 6- will be severe.
ew feelings:
  name: Ew, Feelings
  playbook: The Trickster
  text: When someone offers you **Emotional Support** and you refuse to open up, increase your Feelings by 1 and choose 1 from the listed options for that move as if they rolled 7–9. If they rolled 10+, they know they got through to you; they gain the benefits of a 10+ result as if you had opened up.
the mask:
  name: The Mask
  playbook: The Trickster
  text: "When you seek to persuade an NPC of a lie about yourself, roll +Wit: 
        \n10+: Choose 2
        \n7–9: Choose 1
        \nThey believe a big lie
        \nThe lie you have chosen is unexpectedly perfect, creating a new opportunity 
        \nThey give you the benefit of the doubt and remain convinced even if thereis some evidence of your lie
        \nAdditionally, whenever a PC Figures You Out, you can give false answers. You must increase your Feelings by 1 at the end of any scene where you do this."
center of the web:
  name: The Mask
  playbook: The Trickster
  text: "When someone approaches you to get something from you or threaten you, choose 1:
        \nGain a String on them or they lose a String on you
        \nAsk them a question from the **Figure Out a Person** move
        \n+1 ongoing against them for the scene"
deft fingers:
  name: Deft Fingers
  playbook: The Trickster
  text: "When you filch something from a person, roll +Grace: 
        \n10+: Choose 2
        \n7–9: Choose 1
        \nThe item reveals a secret love or vulnerability
        \nThe item creates an opportunity (such as a map, key, or note) aThe person doesn’t know you took it"
devious scheme:
  name: Devious Scheme
  playbook: The Trickster
  text: "When others go along with your cunning plan, roll +Wit: 
        \n10+: Twice during your plan, you may choose 1
        \n7–9: Once during your plan, you may choose 1
        \nProduce just the right object
        \nDescribe an unexpected weakness in an obstacle aAppear right behind someone at a crucial moment"
knives behind the mask:
  name: Knives Behind the Mask
  playbook: The Trickster
  text: When someone reveals a secret about you in your presence, you’re prepared with a damaging secret about them. If you reveal it now in retaliation, they mark a Condition. If you keep the secret for the time being, gain a String on them.
play the part:
  name: play the part
  playbook: The Trickster
  text: "When you use someone else’s personal item or clothing to disguise yourself as them, roll +Daring:
        \n10+: While you remain so dressed, your disguise is perfect; only your words or deeds may expose you.
        \n7–9: Someone sees through your disguise, but they don’t give you away just yet. Give them a String."
im the juggernaut love:
  name: I'm the Juggernaut, Love!
  playbook: The Bloody
  text: "When you first mark a Condition during a physical conflict, you may upgrade your next **Fight** roll from a down beat to a mixed beat, or from a mixed beat to an up beat. When you do, answer one of these questions:
        \nHow does this conflict add to your reputation?
        \nYou see fear in an enemy’s eyes. How does it make you feel?
        \nTo strike against your opponent, you leave something else open. What is it?
        \nYou feel invincible. What reminds you that you’re painfully mortal?
        \nIf the **Fight** is rolled is against another PC, answer one of these instead: 
        \nWhat does this conflict mean to you?
        \nWhat would you rather be doing than fighting?"
among wolves:
  name: Among Wolves
  playbook: The Bloody
  text: "During a physical conflict, when you **Figure Out a Person**, you may roll +Spirit rather than +Wit. When you do, you may ask an additional question from **The Heart that Wields the Blade**, even on a 6-."
better bundle up:
  name: Better Bundle Up
  playbook: The Bloody
  text: "When you give blunt but honest advice, roll +Spirit: 
        \n10+: They value your direct advice; you gain a String on them and they take +1 forward to act on your advice
        \n7–9: They may choose 1, or else give you a String on them
        \nPoint out a flaw they see in your thinking
        \nAct contrary to your advice to show why you’re wrong"
hows that milkshake taste:
  name: How's that Milkshake Taste?
  playbook: The Bloody
  text: "When dealing with a threat to your community, but not yet engaged in physical conflict, you may take a harmless action designed to wound their pride (like throwing a drink over them). When you do, roll +Daring: 
        \n10+: Choose 2
        \n7–9: Choose 1
        \nThey become flustered and retreat
        \nTheir allies see them as a fool, and they lose critical support
        \nThey become enraged and try to come for you; take a +1 forward to **Fight** move against them"
ive seen things you wouldnt believe:
  name: I've Seen Things You Wouldn't Believe
  playbook: The Bloody
  text: "When you roll **Emotional Support**, you may share a story of something you’ve seen or done that you think will help. If you do, they answer this question:
        \nDoes hearing about my past help you?
        \nIf they answer yes, you may clear a Condition, even on a 6-. If they answer no, lose a String you have on them or mark a Condition."
wolf and cub:
  name: Wolf and Cub
  playbook: The Bloody
  text: Once per session, you may declare your intent to protect someone or something of great value to you. You take +1 forward for actions taken to fulfill that promise. Once per session, when the object of your protection would take a Condition or be harmed, you may take a Condition instead.
mirror ball:
  name: Mirror Ball
  playbook: The Dream Mirror
  text: "When others **Influence with a String** to encourage you to dazzle an audience, describe your performance and roll +Heart:
        \n10+: You each choose 1
        \n7–9: The influencer chooses 1
        \nYour audience is rapt and, optionally, interested in the influencer’s perspectives or culture.
        \nFeelings and sensations linger. For the next scene, a spec- tator may avoid taking one Condition by thinking about your performance.
        \nYou get +1 forward to **Entice** while performing. Optionally, the influencer gets credit for the performance."
antique:
  name: Antique
  playbook: The Dream Mirror
  text: "Choose an aesthetic and past.
        \n**Aesthetic**: Vintage, fairytale, unusual parts, signs of wear 
        \n**Past**:
        \nYou were once close to someone. Why are they no longer around? a You’re obsolete. Who or what replaced you?
        \nYou weren’t made to last. Why do others consider you disposable? aYou’re from a ruined or destroyed society. How did you contribute to its end?
        \nWhen someone says or does something reminiscent of your past, if you open up to them, exchange Strings. If you don’t, take a Condition and give them a String."
mimesis:
  name: Mimesis
  playbook: The Dream Mirror
  text: "When you observe someone for a short time, you may ask one: 
        \nWhat words would you use to say _____?
        \nWhat would you talk about in this situation?
        \nWhat behaviors do you find non-threatening, endearing, or desirable? 
        \nWhom do you wish I was more similar to?"
the new black:
  name: The New Black
  playbook: The Dream Mirror
  text: "Declare a new trend, activity, event, or cultural phenomenon, and spend a String on someone influential. Each member of their group must describe what makes them want to participate. Then describe what you’ll have to hide or change about yourself if you participate"
sorry:
  name: Sorry~!
  playbook: The Dream Mirror
  text: "When your looks or behavior are unacceptable for your social role, choose 1:
        \nGet +1 forward to **Entice** while asking forgiveness or getting self-conscious.
        \nOffer someone a String to find the faux pas charming or endearing. aAsk for guidance or private instruction. If they agree, exchange Strings.
        \nAsk what it would take to overlook it. If you do it, take a String on them. If you don’t, take a Condition."
toy soldier:
  name: Toy Soldier
  playbook: The Dream Mirror
  text: "When you **Fight** for someone else, roll +Heart instead of +Daring. On a 7+, they choose 1 of your options from the **Fight** list."
synchronize:
  name: Synchronize
  playbook: The Ensemble
  text: When you work together seamlessly, you can transform into a single being. Choose two features and one drawback of your synchronized form. You may change these choices whenever the nature of your relationship changes significantly. In addition, while synchronized, you may roll +Harmony instead of the usual stat for any roll, but afterwards you must subtract 1 from your Harmony. At Harmony 0, you must leave your synchronized state. You can choose to un-merge at any time unless you choose the Addictive drawback.
compartmentalize:
  name: Compartmentalize
  playbook: The Ensemble
  text: "You may spend 1 Harmony to avoid feeling each other's Conditions so keenly for a single scene. For every Condition that you have when you activate this move or take later in the scene, decide which of your selves is most keenly affected by it. For actions undertaken by your other half, you may ignore the penalty associated with that Condition, but you can’t clear the Condition through a destructive action. You are still Defeated if you would take a sixth Condition."
public display:
  name: Public Display
  playbook: The Ensemble
  text: "When you proclaim your affection for each other publicly, invent a new cute pet name and roll +Spirit:
        \n10+: Choose 2
        \n7–9: Choose 2 but an onlooker becomes jealous, obsessed, or concerned for one of you
        \nAn onlooker is inspired to confess their feelings
        \nYou warm someone's heart; they may clear a Condition if they affirm your relationship
        \nIncrease your Harmony by 1"
same wavelength:
  name: Same Wavelength
  playbook: The Ensemble
  text: "Your selves can communicate wordlessly whenever the other is near. When you try to connect while apart, roll +Heart: 
        \n10+: You can communicate clearly, sense each others' surroundings, and one of you can show up at the other's side even if it seems implausible. Mark a Condition to bring friends along. 
        \n7–9: You can communicate general feelings and concepts, sense if the other is in danger, and get a general sense of where the other is."
two heads:
  name: Two Heads
  playbook: The Ensemble
  text: "When you **Figure Out a Person** together, you can allow them to ask you a question from the list in order to ask them another question, which can be any question at all, not just ones from the list."
well actually:
  name: Well, Actually
  playbook: The Ensemble
  text: "When your selves disagree, you may spend 1 Harmony to learn the answer to any question you could conceivably know or deduce the answer to and say it aloud. Your other half is skeptical. Take +1 forward to either act on the answer or to act on the skepticism or an alternate theory."
wingmate:
  name: Wingmate
  playbook: The Ensemble
  text: "Whenever one of you talks up the other or otherwise makes them look good, the other takes +1 forward to **Fight** or **Entice**. On a down beat, however, the subject of the move may prove more interested in the wingmate."
antivirus:
  name: Anti-Virus
  playbook: The Hologoddess
  text: "When someone with a String on you is threatened, once per session you can show up to defend them, even if it seems impossible. Take +1 forward to protect them."
the emptiest orchestra:
  name: The Emptiest Orchestra
  playbook: The Hologoddess
  text: "You always know what kind of song most appeals to someone. In addition, if you invite others to join you in song, take +1 forward or clear a Condition."
encartography:
  name: Encartography
  playbook: The Hologoddess
  text: "You have vast stores of information, much of it accurate and some of it useful. When you try to recall information relevant to a challenge before you, roll +Spirit:
        \n10+: The information is precise, accurate, and just what you needed
        \n7–9: Most of the information is accurate, but something crucial is out of date and you don’t know what"
force multiplication:
  name: Force Multiplication
  playbook: The Hologoddess
  text: When you and an ally fight together, you each benefit from your onboard combat suite. When one of you gains a String from **Fighting**, the other also gains a String on the target. If one of you would mark a Condition from **Fighting**, the other may mark it instead. If you’re fighting alongside multiple allies, choose one to be your fighting partner for purposes of this move when you first invoke it during the scene.
justice through precision:
  name: Justice through Precision
  playbook: The Hologoddess
  text: When you **Fight**, you may mark a Condition to choose an additional option, even on a 6-.
please state the nature of your psychiatric emergency:
  name: Please State the Nature of Your Psychiatric Emergency
  playbook: The Hologoddess
  text: If you roll a 10+ when offering **Emotional Support**, you can ask the person you’re supporting about what they hide from everyone else. However, you can’t help but overshare in response. Whoever you comfort gets to ask you a question in return.
sharp with numbers:
  name: Sharp with Numbers
  playbook: The Hologoddess
  text: Your skill with a blade flows not from raw strength, but from your mastery of the tactical field before you. You can roll +Spirit to **Fight** instead of +Daring. That same mastery also allows you to triangulate your position with perfect precision, so you always know where you are.
training drone:
  name: Training Drone
  playbook: The Hologoddess
  text: "You can summon an exact holographic copy of yourself that provides you with an opportunity based on distracting, intimidating, or confusing others. Every time you summon your drone, however, roll +nothing to see which bug manifests:
        \n10+: No bugs. And the hologram is extra sparkly!
        \n7–9: The drone can’t be dismissed for the rest of the session and it’s playing your most embarrassing music from your secret internal playlist.
        \n6-: Your training drone wants to fight and probably fall in love with your friends (in addition to anyone you want them to fight). 
        \nYour holographic clone is also an excellent dance partner, sparring buddy, and always laughs at your jokes."
